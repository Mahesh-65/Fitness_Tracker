apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: fitness-tracker-app
  namespace: fitness
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fitness-tracker-app
  template:
    metadata:
      labels:
        app: fitness-tracker-app
      annotations:
        ad.datadoghq.com/fitness-tracker-app.logs: >-
          [{"source":"nodejs","service":"fitness-tracker-service"},
           {"source":"nodejs","service":"fitness-tracker-app"}]
    spec:
      containers:
        - name: fitness-tracker-app
          image: pulkit197/fitness_tracker-master-copy3-fitness-app:latest
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          envFrom:
            - configMapRef:
                name: fitness-tracker-config
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP

      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #             - key: training
      #               operator: In
      #               values:
      #                 - devops

      #     preferredDuringSchedulingIgnoredDuringExecution:
      #       - weight: 1
      #         preference:
      #           matchExpressions:
      #             - key: training
      #               operator: In
      #               values:
      #                 - devops

      #   podAffinity:
      #     preferredDuringSchedulingIgnoredDuringExecution:
      #       - weight: 1
      #         podAffinityTerm:
      #           labelSelector:
      #             matchExpressions:
      #               - key: app
      #                 operator: In
      #                 values:
      #                   - mongodb
      #           topologyKey: kubernetes.io/hostname

      #   podAntiAffinity:
      #     preferredDuringSchedulingIgnoredDuringExecution:
      #       - weight: 1
      #         podAffinityTerm:
      #           labelSelector:
      #             matchExpressions:
      #               - key: app
      #                 operator: In
      #                 values:
      #                   - fitness-tracker-app
      #           topologyKey: kubernetes.io/hostname
      tolerations:
        - key: "training"
          operator: "Equal"
          value: "devops"
          effect: "NoSchedule"
  strategy:
    blueGreen:
      activeService: fitness-tracker-service
      previewService: fitness-tracker-preview-service
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30
      previewReplicaCount: 1

---
 
apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-service
spec:
  selector:
    app: fitness-tracker-app
  ports:
  - port: 81
    targetPort: 5000
  type: LoadBalancer

---
apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-preview-service
  namespace: fitness

spec:
  type: ClusterIP
  selector:
    app: fitness-tracker-app

  ports:
    - port: 81
      targetPort: 5000

---
apiVersion: v1
kind: Service
metadata:
  name: fitness-tracker-active-service
  namespace: fitness

spec:
  type: ClusterIP
  selector:
    app: fitness-tracker-app

  ports:
    - port: 81
      targetPort: 5000