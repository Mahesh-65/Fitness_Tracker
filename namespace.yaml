apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblockdefaultns
spec:
  crd:
    spec:
      names:
        kind: K8sBlockDefaultNS
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblockdefaultns

        violation[{"msg": msg}] {
          input.review.object.metadata.namespace == "default"
          msg := "Deployments in default namespace are not allowed"
        }