apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fitness-app
  namespace: argocd
spec:
  project: default
 
  source:
    repoURL: https://github.com/Mahesh-65/Fitness_Tracker.git
    targetRevision: HEAD
    path: manifests
 
  destination:
    server: https://kubernetes.default.svc
    namespace: fitness
 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true